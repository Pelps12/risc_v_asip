  "Other CI": "#9467bd",
};

const ctx = canvas.getContext("2d");
const tooltip = document.getElementById("tooltip");
const PAD = {top:30, right:30, bottom:58, left:78};
const W = canvas.width - PAD.left - PAD.right;
const H = canvas.height - PAD.top - PAD.bottom;
let drawn = [];
function opts() {
  return {
    logX: document.getElementById("logX").checked,
    logY: document.getElementById("logY").checked,
    showPareto: document.getElementById("showPareto").checked,
    showAll: document.getElementById("showAll").checked,
    filter: document.getElementById("filterCat").value,

function shown(o) { return POINTS.filter(p => o.showAll && (o.filter === "all" || p.category === o.filter)); }
function tx(v, min, max, log) {
  if (log) { const a = Math.log10(min), b = Math.log10(max); return (Math.log10(v) - a) / (b - a); }
  return (v - min) / (max - min);
}
function fmt(v) { return Number(v).toLocaleString(); }
function niceTicks(min, max, log) {
  if (log) {
    const out = [];
    for (let p = Math.floor(Math.log10(min)); p <= Math.ceil(Math.log10(max)); p++) {

    return out;

  for (let i=0; i<=n; i++) out.push(min + i*step);
  return out;
}

  for (const v of niceTicks(minC, maxC, o.logY)) {

    const front = PARETO.filter(p => o.filter === "all" || p.category === o.filter).sort((a,b)=>a.area-b.area);
    if (front.length > 1) {
      ctx.beginPath();
      front.forEach((p,i) => {
        const x = PAD.left + tx(p.area,minA,maxA,o.logX)*W;
        const y = PAD.top + H - tx(p.cycles,minC,maxC,o.logY)*H;
        if (i === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      });
      ctx.strokeStyle = "#000"; ctx.lineWidth = 1.5; ctx.stroke();
    }
    front.forEach(p => plot(p, true));
  }
}
