const PARETO = [{"variant": "baseline", "cycles": 75929, "area": 160149, "speedup": "1.000", "area_pct": "0.0", "cpi": "3.0", "cpi_no_ci": "N/A", "no_ci_overhead": "N/A", "category": "Baseline", "pareto": true}, {"variant": "accel_mc", "cycles": 55955, "area": 161823, "speedup": "1.357", "area_pct": "1.0", "cpi": "3.0", "cpi_no_ci": "3.0", "no_ci_overhead": "1.000", "category": "Partial CI (MC/SB)", "pareto": true}, {"variant": "accel_mc_sb", "cycles": 54233, "area": 163613, "speedup": "1.400", "area_pct": "2.2", "cpi": "3.0", "cpi_no_ci": "3.0", "no_ci_overhead": "1.000", "category": "Partial CI (MC/SB)", "pareto": true}, {"variant": "accel_full_sb_u4_mc_u1", "cycles": 1701, "area": 172020, "speedup": "44.638", "area_pct": "7.4", "cpi": "4.119", "cpi_no_ci": "N/A", "no_ci_overhead": "N/A", "category": "Full-algorithm CI", "pareto": true}, {"variant": "accel_full_r_u1_sb_u4", "cycles": 1506, "area": 174912, "speedup": "50.418", "area_pct": "9.2", "cpi": "3.646", "cpi_no_ci": "N/A", "no_ci_overhead": "N/A", "category": "Full-algorithm CI", "pareto": true}, {"variant": "accel_full_r_u1", "cycles": 1254, "area": 195436, "speedup": "60.549", "area_pct": "22.0", "cpi": "3.036", "cpi_no_ci": "3.000", "no_ci_overhead": "1.000", "category": "Full-algorithm CI", "pareto": true}, {"variant": "accel_full_r_u2", "cycles": 1247, "area": 219634, "speedup": "60.889", "area_pct": "37.1", "cpi": "3.019", "cpi_no_ci": "3.000", "no_ci_overhead": "1.000", "category": "Full-algorithm CI", "pareto": true}, {"variant": "accel_full_r_u4", "cycles": 1244, "area": 250649, "speedup": "61.036", "area_pct": "56.5", "cpi": "3.012", "cpi_no_ci": "3.000", "no_ci_overhead": "1.000", "category": "Full-algorithm CI", "pareto": true}, {"variant": "accel_full", "cycles": 1241, "area": 264517, "speedup": "61.184", "area_pct": "65.2", "cpi": "3.005", "cpi_no_ci": "3.000", "no_ci_overhead": "1.000", "category": "Full-algorithm CI", "pareto": true}];

const CAT_COLOR = {
  "Baseline":           "#555555",
  "Partial CI (MC/SB)": "#2ca02c",
  "Partial CI (SR)":    "#d62728",
  "Full-algorithm CI":  "#1f77b4",
};

const canvas  = document.getElementById("chart");
const ctx     = canvas.getContext("2d");
const tooltip = document.getElementById("tooltip");

const PAD = { top:30, right:30, bottom:55, left:75 };
const W   = canvas.width  - PAD.left - PAD.right;
const H   = canvas.height - PAD.top  - PAD.bottom;

function getOpts() {
  return {
    logY:       document.getElementById("logY").checked,
    showPareto: document.getElementById("showPareto").checked,
    showAll:    document.getElementById("showAll").checked,
    filter:     document.getElementById("filterCat").value,
  };
}

function visiblePoints(opts) {
  return POINTS.filter(p =>
    opts.showAll &&
    (opts.filter === "all" || p.category === opts.filter)
  );
}

function makeScales(pts, opts) {
  const areas  = pts.map(p => p.area);
  const cycles = pts.map(p => p.cycles);
  const xMin = Math.min(...areas)  * 0.97;
  const xMax = Math.max(...areas)  * 1.03;
  const yMin = opts.logY ? Math.min(...cycles) * 0.7 : Math.min(...cycles) * 0.95;
  const yMax = opts.logY ? Math.max(...cycles) * 1.4 : Math.max(...cycles) * 1.05;

  function xPx(v)  { return PAD.left + (v - xMin) / (xMax - xMin) * W; }
  function yPxLin(v){ return PAD.top  + H - (v - yMin) / (yMax - yMin) * H; }
  function yPxLog(v){ return PAD.top  + H - (Math.log10(v) - Math.log10(yMin))
                                            / (Math.log10(yMax) - Math.log10(yMin)) * H; }
  const yPx = opts.logY ? yPxLog : yPxLin;
  return { xMin, xMax, yMin, yMax, xPx, yPx };
}

function drawAxes(sc, opts) {
  ctx.save();
  ctx.strokeStyle = "#aaa";
  ctx.lineWidth   = 1;
  ctx.fillStyle   = "#333";
  ctx.font        = "11px sans-serif";

  // X axis
  ctx.beginPath();
  ctx.moveTo(PAD.left, PAD.top + H);
  ctx.lineTo(PAD.left + W, PAD.top + H);
  ctx.stroke();

  // Y axis
  ctx.beginPath();
  ctx.moveTo(PAD.left, PAD.top);
  ctx.lineTo(PAD.left, PAD.top + H);
  ctx.stroke();

  // X ticks
  const xTicks = 6;
  for (let i = 0; i <= xTicks; i++) {
    const v = sc.xMin + (sc.xMax - sc.xMin) * i / xTicks;
    const x = sc.xPx(v);
    ctx.beginPath(); ctx.moveTo(x, PAD.top+H); ctx.lineTo(x, PAD.top+H+5); ctx.stroke();
    ctx.textAlign = "center";
    ctx.fillText(Math.round(v/1000)+"k", x, PAD.top+H+18);
  }
  ctx.textAlign = "center";
  ctx.font = "13px sans-serif";
  ctx.fillText("Area (gates)", PAD.left + W/2, PAD.top + H + 44);

  // Y ticks
  ctx.font = "11px sans-serif";
  ctx.textAlign = "right";
  const yTicks = opts.logY
    ? [1000,2000,5000,10000,20000,50000,100000]
    : Array.from({length:7}, (_,i) => Math.round(sc.yMin + (sc.yMax-sc.yMin)*i/6));
  for (const v of yTicks) {
    if (v < sc.yMin || v > sc.yMax) continue;
    const y = sc.yPx(v);
    ctx.beginPath(); ctx.moveTo(PAD.left-5, y); ctx.lineTo(PAD.left, y); ctx.stroke();
    ctx.fillText(v >= 1000 ? (v/1000).toFixed(v<10000?1:0)+"k" : v, PAD.left-8, y+4);
  }
  ctx.save();
  ctx.translate(14, PAD.top + H/2);
  ctx.rotate(-Math.PI/2);
  ctx.textAlign = "center";
  ctx.font = "13px sans-serif";
  ctx.fillText("Cycles", 0, 0);
  ctx.restore();

  ctx.restore();
}

function drawPareto(sc) {
  const sorted = [...PARETO].sort((a,b) => a.area - b.area);
  if (sorted.length < 2) return;
  ctx.save();
  ctx.strokeStyle = "#000";
  ctx.lineWidth   = 1.8;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  for (let i = 0; i < sorted.length; i++) {
    const x = sc.xPx(sorted[i].area);
    const y = sc.yPx(sorted[i].cycles);
    if (i === 0) { ctx.moveTo(x, y); }
    else {
      // step: go to same y as previous, then to new x
      ctx.lineTo(sc.xPx(sorted[i].area), sc.yPx(sorted[i-1].cycles));
      ctx.lineTo(sc.xPx(sorted[i].area), y);
    }
  }
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const opts = getOpts();
  const vis  = visiblePoints(opts);
  if (!vis.length) { drawAxes(makeScales(POINTS, opts), opts); return; }
  const sc   = makeScales(POINTS, opts);
  drawAxes(sc, opts);
  if (opts.showPareto) drawPareto(sc);

  for (const p of vis) {
    const x = sc.xPx(p.area);
    const y = sc.yPx(p.cycles);
    const r = p.pareto && opts.showPareto ? 7 : 5;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = CAT_COLOR[p.category] + (p.pareto && opts.showPareto ? "ff" : "55");
    ctx.fill();
    if (p.pareto && opts.showPareto) {
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }
}

// Tooltip on mousemove
canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  const mx   = e.clientX - rect.left;
  const my   = e.clientY - rect.top;
  const opts = getOpts();
  const vis  = visiblePoints(opts);
  const sc   = makeScales(POINTS, opts);

  let best = null, bestDist = 12;
  for (const p of vis) {
    const dx = sc.xPx(p.area) - mx;
    const dy = sc.yPx(p.cycles) - my;
    const d  = Math.sqrt(dx*dx + dy*dy);
    if (d < bestDist) { bestDist = d; best = p; }
  }

  if (best) {
    tooltip.style.display = "block";
    tooltip.style.left    = (e.clientX + 14) + "px";
    tooltip.style.top     = (e.clientY - 10) + "px";
    tooltip.innerHTML =
      `<b>${best.variant}</b><br>` +
      `Category: ${best.category}<br>` +
      `Cycles: ${best.cycles.toLocaleString()}<br>` +
      `Area: ${best.area.toLocaleString()} gates<br>` +
      `Speedup: ${best.speedup}×<br>` +
      `Area overhead: ${best.area_pct}%<br>` +
      `CPI: ${best.cpi}<br>` +
      `CPI (no-CI): ${best.cpi_no_ci}<br>` +
      `No-CI overhead: ${best.no_ci_overhead}<br>` +
      (best.pareto ? `<span style="color:#8f8">★ Pareto-optimal</span>` : "");
  } else {
    tooltip.style.display = "none";
  }
});
canvas.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });

["logY","showPareto","showAll","filterCat"].forEach(id =>
  document.getElementById(id).addEventListener("change", draw));

draw();
</script>
